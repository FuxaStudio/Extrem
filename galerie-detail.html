<style>

  /* ========== HERO ========== */
  .detail-hero {
    position: relative;
    min-height: min(55vh, 520px);
    background: var(--ink);
    display: flex; flex-direction: column; justify-content: center;
    overflow: hidden;
  }
  .detail-hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?auto=format&fit=crop&w=2400&q=75');
    background-size: cover; background-position: center 35%;
    filter: grayscale(0.15) contrast(1.05);
    transform: scale(1.02);
  }
  .detail-hero::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(15,15,15,0.45) 0%, rgba(15,15,15,0.1) 30%, rgba(15,15,15,0.7) 65%, rgba(15,15,15,0.97) 100%),
      linear-gradient(90deg, rgba(15,15,15,0.55) 0%, rgba(15,15,15,0) 60%);
  }
  .detail-hero > .container {
    position: relative; z-index: 2;
    padding-top: 32px;
    padding-bottom: 64px;
    color: var(--paper);
    text-align: center;
  }

  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: rgba(255,255,255,0.6);
    text-decoration: none; transition: color .2s;
    margin-bottom: 40px;
  }
  .back-link:hover { color: var(--paper); }
  .back-link svg { transition: transform .2s; }
  .back-link:hover svg { transform: translateX(-3px); }

  .detail-hero h1 {
    font-family: var(--display); font-weight: 800;
    font-size: clamp(64px, 12vw, 180px);
    line-height: 0.85; letter-spacing: -0.04em;
    text-transform: uppercase;
    margin: 0 0 20px;
    color: var(--paper);
  }
  .detail-hero .event-date {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(255,255,255,0.5);
  }

  /* ========== PHOTO GRID ========== */
  .foto-section {
    padding: 72px 0 120px;
  }
  .foto-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }
  .foto-head .eyebrow { margin-bottom: 0; }
  .foto-head .count {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-60);
  }

  .foto-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    grid-auto-rows: 240px;
  }
  .foto-grid .f {
    overflow: hidden;
    background: #222;
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .foto-grid .f.wide { grid-column: span 2; }
  .foto-grid .f.tall { grid-row: span 2; }
  .foto-grid .f img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .8s cubic-bezier(.2,.7,.2,1), filter .3s ease;
    filter: grayscale(10%);
  }
  .foto-grid .f:hover img { transform: scale(1.07); filter: grayscale(0%); }

  @media (max-width: 900px) {
    .foto-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 200px; }
    .foto-grid .f.wide, .foto-grid .f.tall { grid-column: auto; grid-row: auto; }
  }
  @media (max-width: 520px) {
    .foto-grid { grid-template-columns: 1fr; grid-auto-rows: 220px; gap: 6px; }
    .foto-grid .f.wide, .foto-grid .f.tall { grid-column: auto; grid-row: auto; }
  }

</style>
</head>
