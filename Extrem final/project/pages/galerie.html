<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" type="image/png" href="../assets/Images/logo.png"/>
<title>Galerie — Svídnický Extrém</title>
<link rel="stylesheet" href="../assets/shared.css?v=1776862203011"/>
<style>
  .page-header--hero {
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 100%),
      url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
  }

  .filters { padding: 48px 0 24px; border-bottom: 1px solid var(--line); }
  .f-row { display:flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }
  .f-chips { display:flex; gap: 10px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--display); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; font-size: 14px;
    padding: 10px 18px; border: 1.5px solid var(--line); border-radius: 2px;
    background: transparent; cursor: pointer; color: var(--ink-80);
    transition: all .2s ease;
  }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip .n { font-family: var(--mono); font-size: 13px; letter-spacing: 0.08em; opacity: 0.55; line-height: 1; margin-left: 4px; }


  .gal-wrap { padding: 48px 0 120px; }
  .gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    grid-auto-rows: 260px;
  }
  .gallery .g {
    overflow: hidden;
    background: #222;
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    transition: opacity .3s ease, transform .3s ease;
  }
  .gallery .g.hidden { display: none; }
  .gallery .g.wide { grid-column: span 2; }
  .gallery .g.tall { grid-row: span 2; }
  .gallery .g img {
    width:100%; height:100%; object-fit: cover;
    transition: transform .8s cubic-bezier(.2,.7,.2,1), filter .3s ease;
    filter: grayscale(15%);
  }
  .gallery .g:hover img { transform: scale(1.06); filter: grayscale(0%); }
  .gallery .g .meta {
    position: absolute; left: 12px; bottom: 12px; right: 12px;
    display:flex; justify-content: flex-start; align-items: end;
    opacity: 0; transition: opacity .3s ease;
  }
  .gallery .g:hover .meta { opacity: 1; }
  .gallery .g .meta .t {
    background: rgba(15,15,15,0.75); backdrop-filter: blur(6px);
    color: var(--paper); padding: 6px 10px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .gallery .g .date-stamp {
    position: absolute; right: 12px; bottom: 12px;
    background: var(--accent); color: var(--ink);
    padding: 5px 9px;
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0; transition: opacity .3s ease, transform .3s ease;
    transform: translateY(4px);
  }
  .gallery .g:hover .date-stamp { opacity: 1; transform: translateY(0); }
  .gallery .g .cat-tag {
    position: absolute; left: 12px; top: 12px;
    background: var(--paper); color: var(--ink);
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 5px 9px;
    max-width: calc(100% - 24px);
  }

  @media (max-width: 900px){
    .gallery { grid-template-columns: 1fr 1fr; grid-auto-rows: 200px; }
    .gallery .g.wide, .gallery .g.tall { grid-column: auto; grid-row: auto; }
    .gallery .g .date-stamp,
    .gallery .g .meta { display: none; }
  }

  @media (max-width: 600px){
    .gallery { grid-template-columns: 1fr; grid-auto-rows: 240px; }
  }

  @media (min-width: 901px){
    .gallery .g .cat-tag br { display: none; }
  }


</style>
</head>
<body>

<div id="nav-mount"></div>

<section class="page-header page-header--hero">
  <div class="container">
    <h1>Galerie.</h1>
  </div>
</section>

<section class="filters">
  <div class="container">
    <div class="f-row">
      <div class="f-chips" id="chips">
        <button class="chip active" data-cat="all">Vše <span class="n">28</span></button>
        <button class="chip" data-cat="trenink-dospeli">Trénink - Dospělí <span class="n">7</span></button>
        <button class="chip" data-cat="trenink-deti">Trénink - Děti <span class="n">5</span></button>
        <button class="chip" data-cat="zavody">Závody <span class="n">10</span></button>
        <button class="chip" data-cat="akce">Akce <span class="n">6</span></button>
      </div>
    </div>
  </div>
</section>

<section class="gal-wrap">
  <div class="container">
    <div class="gallery" id="gallery">
      <!-- generated by JS below -->
    </div>
  </div>
</section>

<div id="footer-mount"></div>
<script src="../assets/shared.js?v=1776861924530"></script>
<script>SE.mount('gallery');

const IMAGES = [
  {src:'1552674605-db6ffd4facb5', cat:'zavody', title:'Svídnický Extrém 2025', date:'15. 6. 2025', size:'wide tall'},
  {src:'1571019613454-1cb2f99b2d8b', cat:'trenink-dospeli', title:'Středa večer', date:'15. 4. 2026'},
  {src:'1599058917212-d750089bc07e', cat:'trenink-deti', title:'Děti na laně', date:'18. 3. 2026'},
  {src:'1541534741688-6078c6bfb5c5', cat:'zavody', title:'Start hlavního závodu', date:'15. 6. 2025', size:'wide'},
  {src:'1511406361295-0a1ff814c0ce', cat:'akce', title:'Vítání prázdnin', date:'29. 6. 2025'},
  {src:'1517963879433-6ad2b056d712', cat:'zavody', title:'Monkey bars', date:'15. 6. 2025'},
  {src:'1594737625785-a6cbdabd333c', cat:'trenink-dospeli', title:'Rozcvička', date:'12. 2. 2026', size:'tall'},
  {src:'1530143311094-34d807799e8f', cat:'zavody', title:'Zeď 3m', date:'15. 6. 2025'},
  {src:'1528164344705-47542687000d', cat:'akce', title:'Tábor Chýnice', date:'10. 7. 2025'},
  {src:'1540496905036-5937c10647cc', cat:'zavody', title:'Bláto & úsměvy', date:'15. 6. 2025'},
  {src:'1546483875-ad9014c88eba', cat:'zavody', title:'Finiš', date:'15. 6. 2025'},
  {src:'1533681904393-9ab6eee7e408', cat:'zavody', title:'Traverz lanem', date:'15. 6. 2025', size:'wide'},
  {src:'1533162507191-d90c625b2640', cat:'akce', title:'Ohniště', date:'30. 8. 2025'},
  {src:'1523301343968-6a6ebf63c672', cat:'akce', title:'Tábor', date:'20. 7. 2025', size:'tall'},
  {src:'1464822759023-fed622ff2c3b', cat:'akce', title:'Krkonoše', date:'18. 5. 2025'},
  {src:'1519904981063-b0cf448d479e', cat:'akce', title:'Český ráj', date:'22. 4. 2025'},
  {src:'1501785888041-af3ef285b470', cat:'akce', title:'Beskydy', date:'14. 9. 2025'},
  {src:'1521737711867-e3b97375f902', cat:'trenink-dospeli', title:'Silový', date:'22. 1. 2026'},
  {src:'1517649763962-0c623066013b', cat:'zavody', title:'Tunely', date:'15. 6. 2025', size:'wide'},
  {src:'1575052814086-f385e2e2ad1b', cat:'trenink-deti', title:'Atletika', date:'25. 2. 2026'},
  {src:'1518611012118-696072aa579a', cat:'trenink-dospeli', title:'Běh v terénu', date:'17. 11. 2025'},
  {src:'1486218119243-13883505764c', cat:'akce', title:'Pěna', date:'30. 8. 2025'},
  {src:'1519491050282-cf00c82424b4', cat:'trenink-dospeli', title:'Dřep', date:'15. 12. 2025'},
  {src:'1556745757-8d76bdb6984b', cat:'zavody', title:'Cíl', date:'15. 6. 2025'},
  {src:'1594737625785-a6cbdabd333c', cat:'trenink-deti', title:'Hravý trénink', date:'14. 1. 2026'},
];

const CATS = {all:'Vše', 'trenink-dospeli':'Trénink - Dospělí', 'trenink-deti':'Trénink - Děti', zavody:'Závod', akce:'Akce'};

const g = document.getElementById('gallery');
g.innerHTML = IMAGES.map(im => `
  <div class="g ${im.size||''}" data-cat="${im.cat}">
    <img src="https://images.unsplash.com/photo-${im.src}?auto=format&fit=crop&w=1200&q=60" alt="${im.title}" loading="lazy"/>
    <div class="cat-tag">${CATS[im.cat]}</div>
    <div class="date-stamp">${im.date}</div>
    <div class="meta">
      <span class="t">${im.title}</span>
    </div>
  </div>
`).join('');

const chips = document.querySelectorAll('#chips .chip');
chips.forEach(c => c.addEventListener('click', () => {
  chips.forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  const cat = c.dataset.cat;
  document.querySelectorAll('#gallery .g').forEach(el => {
    const match = cat === 'all' || el.dataset.cat === cat;
    el.classList.toggle('hidden', !match);
  });
}));
</script>
</body>
</html>
